language: rust
dist: bionic
osx_image: xcode11
cache: cargo

notifications:
  email: false

addons:
  apt:
    packages:
      - python3
      - python3-pip
      - python3-setuptools
  homebrew:
    update: true
    packages:
      - python
os:
  - linux
  - osx

rust:
  - nightly
  - beta
  - stable

script:
  - cargo build
  - cargo build --release
  - cargo test
  - ./test.py
