    let y = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e pos.y,\n            Cursor::Selection {\n                range: Range { end, .. },\n                ..\n            } =\u003e end.y,\n        };\n\n        self.set_cursor(Cursor::new(y, self.rope.line_len(y)));\n    }\n\n    pub fn move_to_beginning_of_line(\u0026mut self) {\n        let y = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e pos.y,\n            Cursor::Selection {\n                range: Range { end, .. },\n                ..\n            } =\u003e end.y,\n        };\n\n        self.set_cursor(Cursor::new(y, 0));\n    }\n\n    pub fn move_to_prev_word(\u0026mut self) {\n        let pos = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        let new_pos = self.rope.prev_word_end(\u0026pos);\n        self.set_cursor(Cursor::new(new_pos.y, new_pos.x));\n    }\n\n    pub fn move_to_next_word(\u0026mut self) {\n        let pos = match \u0026mut self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        let new_pos = self.rope.next_word_end(\u0026pos);\n        self.set_cursor(Cursor::new(new_pos.y, new_pos.x));\n    }\n\n    pub fn select(\u0026mut self, up: usize, down: usize, left: usize, right: usize) {\n        let (start, mut end) = match \u0026mut self.cursor {\n            Cursor::Normal { pos, .. } =\u003e (*pos, *pos),\n            Cursor::Selection {\n                range: Range { start, end },\n                ..\n            } =\u003e (*start, *end),\n        };\n\n        end.move_by(\u0026self.rope, up, down, left, right);\n        self.set_cursor(Cursor::from_range(\u0026Range::from_points(start, end)));\n    }\n\n    pub fn select_until_beginning_of_line(\u0026mut self) {\n        let (mut start, mut end) = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e (*pos, *pos),\n            Cursor::Selection {\n                range: Range { start, end },\n                ..\n            } =\u003e (*start, *end),\n        };\n\n        if end == start \u0026\u0026 end.x == 0 \u0026\u0026 start.y \u003e 0 {\n            start.y -= 1;\n            start.x = self.line_len(start.y);\n        } else {\n            end.x = 0;\n        }\n\n        self.set_cursor(Cursor::from_range(\u0026Range::from_points(start, end)));\n    }\n\n    pub fn select_until_end_of_line(\u0026mut self) {\n        let (start, mut end) = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e (*pos, *pos),\n            Cursor::Selection {\n                range: Range { start, end },\n                ..\n            } =\u003e (*start, *end),\n        };\n\n        end.x = self.rope.line_len(end.y);\n        if start == end \u0026\u0026 end.y \u003c self.num_lines() {\n            end.y += 1;\n            end.x = 0;\n        }\n\n        self.set_cursor(Cursor::from_range(\u0026Range::from_points(start, end)));\n    }\n\n    pub fn insert_char(\u0026mut self, ch: char) {\n        self.insert(\u0026ch.to_string())\n    }\n\n    pub fn insert(\u0026mut self, string: \u0026str) {\n        let string_count = string.chars().count();\n        let (remove, insert_at, _end) = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e (None, pos, pos),\n            Cursor::Selection { range, .. } =\u003e (Some(range), range.front(), range.back()),\n        };\n\n        if let Some(remove) = remove {\n            self.rope.remove(\u0026remove);\n        }\n\n        // Handle insertion at the end of file.\n        if insert_at.y == self.num_lines() \u0026\u0026 string != \"\\n\" {\n            debug_assert!(insert_at.x == 0);\n            self.rope.insert(insert_at, \"\\n\");\n        }\n\n        self.rope.insert(insert_at, string);\n\n        let num_newlines_added = string.matches('\\n').count();\n        let num_newlines_deleted = remove.map(|r| r.back().y - r.front().y).unwrap_or(0);\n        let y_diff = num_newlines_added.saturating_sub(num_newlines_deleted);\n\n        let x_diff = string\n            .chars()\n            .rev()\n            .position(|c| c == '\\n')\n            .map(|x| string_count - x - 1)\n            .unwrap_or(string_count);\n\n        let y = insert_at.y + y_diff;\n        let x = if string.contains('\\n') {\n            x_diff\n        } else {\n            insert_at.x + x_diff\n        };\n\n        self.set_cursor(Cursor::new(y, x));\n    }\n\n    pub fn indent_size(\u0026self, y: usize) -\u003e usize {\n        let mut n = 0;\n        let line = self.rope.line(y);\n        'outer: for c in line.chunks() {\n            for ch in c.chars() {\n                if !ch.is_ascii_whitespace() {\n                    break 'outer;\n                }\n\n                n += 1;\n            }\n        }\n\n        n\n    }\n\n    pub fn insert_with_smart_indent(\u0026mut self, ch: char) {\n        match ch {\n            '\\n' =\u003e {\n                let pos = self.main_cursor_pos();\n                let do_auto_indent = pos.y \u003c self.num_lines()\n                    \u0026\u0026 (self.indent_size(pos.y) \u003e 0\n                        || self\n                            .line_substr(pos.y, pos.x.saturating_sub(1))\n                            .ends_with('{'));\n                self.insert_char('\\n');\n                if do_auto_indent {\n                    self.tab();\n                }\n            }\n            '}' =\u003e {\n                if matches!(self.cursor, Cursor::Normal { pos, .. } if self.indent_size(pos.y) == self.line_len(pos.y))\n                {\n                    self.back_tab();\n                }\n\n                self.insert_char('}');\n            }\n            _ =\u003e {\n                self.insert_char(ch);\n            }\n        }\n    }\n\n    pub fn tab(\u0026mut self) {\n        let pos = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection { range, .. } =\u003e range.front(),\n        };\n\n        // Should we do auto-indent?\n        let auto_indent = pos.x \u003c= self.indent_size(pos.y);\n        let x;\n        if auto_indent {\n            let prev_indent_size = if pos.y \u003e 0 {\n                self.indent_size(pos.y - 1)\n            } else {\n                0\n            };\n            let increase_depth = self\n                .line_substr(\n                    pos.y.saturating_sub(1),\n                    self.line_len(pos.y.saturating_sub(1)).saturating_sub(1),\n                )\n                .ends_with('{');\n            let indent_size = if increase_depth {\n                prev_indent_size + self.config.indent_size\n            } else {\n                max(prev_indent_size, self.config.indent_size)\n            };\n            let num_chars = indent_size - (pos.x % indent_size);\n\n            x = pos.x + num_chars;\n            let ch = match self.config.indent_style {\n                IndentStyle::Space =\u003e ' ',\n                IndentStyle::Tab =\u003e '\\t',\n            };\n            for _ in 0..num_chars {\n                self.rope.insert_char(pos, ch);\n            }\n        } else {\n            // Not auto indent; the user just wants to input '\\t'.\n            self.rope.insert_char(pos, '\\t');\n            x = pos.x + 1;\n        }\n\n        self.cursor = Cursor::new(pos.y, x);\n    }\n\n    // Decrease indent levels.\n    pub fn back_tab(\u0026mut self) {\n        let pos = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection { range, .. } =\u003e range.front(),\n        };\n\n        let n = min(\n            self.indent_size(pos.y),\n            if pos.x % self.config.indent_size == 0 {\n                self.config.indent_size\n            } else {\n                pos.x % self.config.indent_size\n            },\n        );\n        if n \u003e 0 {\n            let start = Point::new(pos.y, 0);\n            let end = Point::new(pos.y, n);\n            self.rope.remove(\u0026Range::from_points(start, end));\n            self.cursor = Cursor::new(pos.y, pos.x.saturating_sub(n));\n        } else {\n            self.cursor = Cursor::new(pos.y, pos.x);\n        }\n    }\n\n    pub fn backspace(\u0026mut self) {\n        // Move the cursor at the end of previous line if it is at EOF.\n        if let Cursor::Normal { pos, .. } = \u0026self.cursor {\n            if pos.y \u003e 0 \u0026\u0026 pos.y == self.num_lines() {\n                self.cursor = Cursor::new(pos.y - 1, self.line_len(pos.y - 1));\n            }\n        }\n\n        // Determine the range to be deleted.\n        let range = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e {\n                let start = if pos.y == 0 \u0026\u0026 pos.x == 0 {\n                    return;\n                } else if pos.x == 0 {\n                    Point::new(pos.y - 1, self.rope.line_len(pos.y - 1))\n                } else {\n                    Point::new(pos.y, pos.x - 1)\n                };\n\n                Range::from_points(start, *pos)\n            }\n            Cursor::Selection { range, .. } =\u003e range.clone(),\n        };\n\n        self.rope.remove(\u0026range);\n        self.cursor = Cursor::from_point(range.front());\n    }\n\n    pub fn delete(\u0026mut self) {\n        // Determine the range to be deleted.\n        let range = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e {\n                let max_y = self.rope.num_lines();\n                let max_x = self.rope.line_len(pos.y);\n                let end = if pos.y == max_y \u0026\u0026 pos.x == max_x {\n                    // At EOF.\n                    return;\n                } else if pos.x == max_x {\n                    Point::new(pos.y + 1, 0)\n                } else {\n                    Point::new(pos.y, pos.x + 1)\n                };\n\n                Range::from_points(*pos, end)\n            }\n            Cursor::Selection { range, .. } =\u003e range.clone(),\n        };\n\n        self.rope.remove(\u0026range);\n        self.cursor = Cursor::from_point(range.front());\n    }\n\n    pub fn truncate(\u0026mut self) {\n        self.select_until_end_of_line();\n        self.delete();\n    }\n\n    pub fn truncate_reverse(\u0026mut self) {\n        self.select_until_beginning_of_line();\n        self.delete();\n    }\n\n    pub fn toggle_comment_out(\u0026mut self) {\n        let prefix = match self.language.comment_out {\n            Some(prefix) =\u003e prefix,\n            None =\u003e return,\n        };\n\n        let (ys, _x) = match self.cursor() {\n            Cursor::Normal { pos, .. } =\u003e (pos.y..=pos.y, pos.x),\n            Cursor::Selection { range, .. } =\u003e {\n                let front = range.front();\n                (front.y..=range.back().y, front.x)\n            }\n        };\n\n        let prefix_len = prefix.chars().count();\n        for y in ys {\n            let indent_size = self.indent_size(y);\n            if self.line_substr(y, indent_size).starts_with(prefix) {\n                self.rope\n                    .remove(\u0026Range::new(y, indent_size, y, indent_size + prefix_len));\n            } else {\n                self.rope.insert(\u0026Point::new(y, indent_size), prefix);\n            }\n        }\n\n        if let Cursor::Normal { pos, .. } = \u0026mut self.cursor {\n            pos.x += prefix_len;\n        }\n    }\n\n    pub fn mark_undo_point(\u0026mut self) {\n        match self.undo_stack.last() {\n            Some(rope) if *rope == self.rope =\u003e {\n                // The buffer is not modified.\n                return;\n            }\n            _ =\u003e {}\n        }\n\n        self.undo_stack.push(self.rope.clone());\n        self.version += 1;\n        self.is_dirty = true;\n    }\n\n    pub fn undo(\u0026mut self) {\n        if self.undo_stack.len() == 1 \u0026\u0026 self.rope.is_empty() {\n            return;\n        }\n\n        if let Some(top) = self.undo_stack.last() {\n            if *top == self.rope {\n                self.undo_stack.pop();\n            }\n        }\n\n        if let Some(rope) = self.undo_stack.pop() {\n            self.redo_stack.push(self.rope.clone());\n            self.rope = rope;\n        }\n    }\n\n    pub fn redo(\u0026mut self) {\n        if let Some(buf) = self.redo_stack.pop() {\n            self.undo_stack.push(self.rope.clone());\n            self.rope = buf;\n        }\n    }\n\n    pub fn cut_selection(\u0026mut self) -\u003e String {\n        let text = self.copy_selection();\n        self.backspace();\n        text\n    }\n\n    pub fn copy_selection(\u0026mut self) -\u003e String {\n        let mut text = String::new();\n        if let Cursor::Selection { range, .. } = \u0026self.cursor {\n            for chunk in self.rope.sub_str(range).chunks() {\n                text += chunk;\n            }\n        }\n\n        text\n    }\n\n    pub fn paste(\u0026mut self, text: \u0026str) {\n        self.insert(text);\n    }\n\n    pub fn current_word(\u0026self) -\u003e Option\u003cString\u003e {\n        let pos = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        self.rope.word_at(pos).map(|(_, word)| word)\n    }\n\n    pub fn current_word_range(\u0026self) -\u003e Option\u003cRange\u003e {\n        let pos = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        self.rope.word_at(pos).map(|(range, _)| range)\n    }\n\n    pub fn prev_word_range(\u0026self) -\u003e Option\u003cRange\u003e {\n        let pos = match \u0026self.cursor {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        self.rope.prev_word_at(pos)\n    }\n\n    pub fn find(\u0026mut self, needle: \u0026str) -\u003e Vec\u003cRange\u003e {\n        if needle.is_empty() {\n            return Vec::new();\n        }\n\n        // TODO: Implement a well-known better algorithm.\n        let needle_chars: Vec\u003cchar\u003e = needle.chars().collect();\n        let mut matches = Vec::new();\n        let mut y = 0;\n        let mut x = 0;\n        for ch in self.rope.chars() {\n            for m in \u0026mut matches {\n                match m {\n                    (0, _) =\u003e {\n                        // this `m` does not match.\n                    }\n                    (next_index, _) if *next_index == needle_chars.len() =\u003e {\n                        // This `m` matches to the needle.\n                    }\n                    (next_index, _) if needle_chars[*next_index] == ch =\u003e {\n                        // This `m` partially matches to the needle. Go to the\n                        // next char...\n                        *next_index += 1;\n                    }\n                    (next_index, _) =\u003e {\n                        // this `m` does not match.\n                        *next_index = 0;\n                    }\n                }\n            }\n\n            if ch == needle_chars[0] {\n                matches.push((1, Point::new(y, x)));\n            }\n\n            if ch == '\\n' {\n                y += 1;\n                x = 0;\n            } else {\n                x += 1;\n            }\n        }\n\n        let y_len = needle.matches('\\n').count();\n        let last_newline_idx = needle.rfind('\\n');\n\n        matches\n            .iter()\n            .filter(|(index, _)| *index == needle_chars.len())\n            .map(|(_, start)| {\n                let x = last_newline_idx\n                    .map(|i| needle.len() - i - 1)\n                    .unwrap_or_else(|| start.x + needle.len());\n                Range::new(start.y, start.x, start.y + y_len, x)\n            })\n            .collect::\u003cVec\u003cRange\u003e\u003e()\n    }\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn insertion_and_deletion() {\n        let mut b = Buffer::new();\n        b.backspace();\n        b.insert(\"Hello\");\n        b.insert(\" World?\");\n        assert_eq!(b.text(), \"Hello World?\");\n        b.backspace();\n        assert_eq!(b.text(), \"Hello World\");\n        b.insert_char('!');\n        assert_eq!(b.text(), \"Hello World!\");\n        b.move_cursor(0, 0, 1, 0); // Move left\n        b.delete();\n        assert_eq!(b.text(), \"Hello World\");\n        b.delete();\n        assert_eq!(b.text(), \"Hello World\");\n    }\n\n    #[test]\n    fn insert_at_eof() {\n        let mut b = Buffer::new();\n        b.insert(\"abc\");\n        b.move_cursor(0, 1, 0, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n        b.insert_char('x');\n        assert_eq!(b.text(), \"abc\\nx\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 1));\n        b.insert_char('y');\n        assert_eq!(b.text(), \"abc\\nxy\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 2));\n    }\n\n    #[test]\n    fn backspace_at_eof() {\n        let mut b = Buffer::new();\n        b.insert(\"abc\");\n        b.set_cursor(Cursor::new(1, 0));\n        b.backspace();\n        assert_eq!(b.text(), \"ab\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 2));\n\n        let mut b = Buffer::new();\n        b.insert(\"abc\\n\");\n        b.set_cursor(Cursor::new(1, 0));\n        b.backspace();\n        assert_eq!(b.text(), \"abc\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n\n        let mut b = Buffer::new();\n        b.backspace();\n        assert_eq!(b.text(), \"\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n    }\n\n    #[test]\n    fn move_cursor() {\n        let mut b = Buffer::new();\n        b.move_cursor(1, 0, 0, 0); // Do nothing\n        b.insert(\"A\\nDEF\\n12345\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(2, 5));\n        b.move_cursor(0, 0, 1, 0); // Move right\n        assert_eq!(b.cursor(), \u0026Cursor::new(2, 4));\n        b.move_cursor(1, 0, 0, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 3));\n        b.move_cursor(0, 3, 0, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(3, 0));\n        b.move_cursor(0, 0, 1, 0); // Move left\n        assert_eq!(b.cursor(), \u0026Cursor::new(2, 5));\n        b.move_cursor(0, 0, 0, 1); // Move right\n        assert_eq!(b.cursor(), \u0026Cursor::new(3, 0));\n    }\n\n    #[test]\n    fn multibyte_characters() {\n        let mut b = Buffer::new();\n        b.insert(\"Hello 世界!\");\n        b.set_cursor(Cursor::new(0, 7));\n        assert_eq!(b.len(), 9);\n\n        // Hello 世|界! =\u003e Hello |界!\n        b.backspace();\n        assert_eq!(b.text(), \"Hello 界!\");\n        // Hello 世|界! =\u003e Hell|界!\n        b.backspace();\n        b.backspace();\n        assert_eq!(b.text(), \"Hell界!\");\n        // Hello 世|界! =\u003e Hell|界!\n        b.insert(\"o こんにちは 世\");\n        assert_eq!(b.text(), \"Hello こんにちは 世界!\");\n    }\n\n    #[test]\n    fn multibyte_characters_regression1() {\n        let mut b = Buffer::new();\n        b.set_cursor(Cursor::new(0, 0));\n        b.insert_char('a');\n        b.insert_char('あ');\n        b.insert_char('!');\n        assert_eq!(b.text(), \"aあ!\");\n    }\n\n    #[test]\n    fn move_down_cursor_in_wrapped_line() {\n        // aあ|b   =\u003e   aあb   =\u003e   aあb\n        // い12         い1|2       い12\n        //                         |\n        // (both are wrapped)\n        let mut b = Buffer::new();\n        b.insert(\"aあbい12\");\n        b.set_cursor(Cursor::new(0, 2));\n        b.move_cursor_with_line_wrap(4, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 5));\n        b.move_cursor_with_line_wrap(4, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n\n        // wxyz          wxyz\n        // aあ|b   =\u003e   aあb\n        // い12         い1|2\n        //\n        // (both are wrapped)\n        let mut b = Buffer::new();\n        b.insert(\"wxyzaあbい12\");\n        b.set_cursor(Cursor::new(0, 6));\n        b.move_cursor_with_line_wrap(4, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 9));\n\n        // aあbc|   =\u003e   aあbc\n        // い            い|\n        //\n        // (both are wrapped)\n        let mut b = Buffer::new();\n        b.insert(\"aあbcい\");\n        b.set_cursor(Cursor::new(0, 4));\n        b.move_cursor_with_line_wrap(5, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 5));\n\n        // 1行|目   =\u003e   1行目\n        // 2行目         2行|目\n        //\n        //   (two lines)\n        let mut b = Buffer::new();\n        b.insert(\"1行目\\n2行目\");\n        b.set_cursor(Cursor::new(0, 2));\n        b.move_cursor_with_line_wrap(5, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 2));\n\n        // aあbc| =\u003e aあbc\n        //          |\n        let mut b = Buffer::new();\n        b.insert(\"aあbc\");\n        b.set_cursor(Cursor::new(0, 4));\n        b.move_cursor_with_line_wrap(5, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n\n        // | =\u003e\n        //      |\n        let mut b = Buffer::new();\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_cursor_with_line_wrap(5, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n        b.move_cursor_with_line_wrap(5, 0, 10);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n    }\n\n    #[test]\n    fn move_up_cursor_in_wrapped_line() {\n        // aあb     =\u003e   aあ|b\n        // い1|2         い12\n        //\n        // (both are wrapped)\n        let mut b = Buffer::new();\n        b.insert(\"aあbい12\");\n        b.set_cursor(Cursor::new(0, 5));\n        b.move_cursor_with_line_wrap(4, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 2));\n\n        // wxyz         wxy|z\n        // aあ|b   =\u003e   aあb\n        // い12         い12\n        //\n        // (both are wrapped)\n        let mut b = Buffer::new();\n        b.insert(\"wxyzaあbい12\");\n        b.set_cursor(Cursor::new(0, 6));\n        b.move_cursor_with_line_wrap(4, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n\n        // 1行目   =\u003e   1行|目\n        // 2行|目       2行目\n        //\n        //   (two lines)\n        let mut b = Buffer::new();\n        b.insert(\"1行目\\n2行目\");\n        b.set_cursor(Cursor::new(1, 2));\n        b.move_cursor_with_line_wrap(5, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 2));\n\n        // abcd     =\u003e   abc|d\n        // 123|4         1234\n        //\n        //   (two lines)\n        let mut b = Buffer::new();\n        b.insert(\"abcd\\n1234\");\n        b.set_cursor(Cursor::new(1, 3));\n        b.move_cursor_with_line_wrap(10, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n\n        // ab       =\u003e   ab|\n        // 12345|        12345\n        //\n        //   (two lines)\n        let mut b = Buffer::new();\n        b.insert(\"ab\\n12345\");\n        b.set_cursor(Cursor::new(1, 5));\n        b.move_cursor_with_line_wrap(10, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 2));\n\n        // aあbc| =\u003e aあbc|\n        let mut b = Buffer::new();\n        b.insert(\"aあbc\");\n        b.set_cursor(Cursor::new(0, 4));\n        b.move_cursor_with_line_wrap(5, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 4));\n\n        // | =\u003e |\n        let mut b = Buffer::new();\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_cursor_with_line_wrap(5, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n    }\n\n    #[test]\n    fn logical_cursor_x() {\n        // abc|d   =\u003e   abcd\n        //\n        // 1234         123|4\n        let mut b = Buffer::new();\n        b.insert(\"abcd\\n\\n1234\");\n        b.set_cursor(Cursor::new(0, 3));\n        b.move_cursor_with_line_wrap(30, 0, 2);\n        assert_eq!(b.cursor(), \u0026Cursor::new(2, 3));\n\n        // abc|d   =\u003e   abcd    =\u003e   abcd    =\u003e   abcd\n        // xy           xy|          x|y          xy\n        // 1234         1234         1234         1|234\n        let mut b = Buffer::new();\n        b.insert(\"abcd\\nxy\\n1234\");\n        b.set_cursor(Cursor::new(0, 3));\n        b.move_cursor_with_line_wrap(30, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 2));\n        b.move_cursor(0, 0, 1, 0);\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 1));\n        b.move_cursor_with_line_wrap(30, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::new(2, 1));\n    }\n\n    #[test]\n    fn single_selection() {\n        let mut b = Buffer::new();\n        b.insert(\"abXYZcd\");\n        b.set_cursor(Cursor::new(0, 2));\n\n        // ab|XYZ|cd\n        b.select(0, 0, 0, 3);\n        assert_eq!(b.cursor(), \u0026Cursor::from_range(\u0026Range::new(0, 2, 0, 5)));\n\n        // a|b|XYZcd  =\u003e  a|XYZcd\n        b.select(0, 0, 4, 0);\n        b.backspace();\n        assert_eq!(b.text(), \"aXYZcd\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 1));\n\n        // a|XYZ|cd  =\u003e  a|cd\n        b.select(0, 0, 0, 3);\n        b.backspace();\n        assert_eq!(b.text(), \"acd\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 1));\n\n        // ab|  =\u003e  ab|\n        // c        |c\n        let mut b = Buffer::new();\n        b.insert(\"ab\\nc\");\n        b.set_cursor(Cursor::new(0, 2));\n        b.select(0, 0, 0, 1);\n        assert_eq!(b.cursor(), \u0026Cursor::from_range(\u0026Range::new(0, 2, 1, 0)));\n    }\n\n    #[test]\n    fn single_selection_including_newlines() {\n        // xy|A     xy|z\n        // BCD  =\u003e\n        // E|z\n        let mut b = Buffer::new();\n        b.insert(\"xyA\\nBCD\\nEz\");\n        b.set_cursor(Cursor::from_range(\u0026Range::new(0, 2, 2, 1)));\n        b.backspace();\n        assert_eq!(b.text(), \"xyz\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 2));\n\n        // ab|      abX|c\n        // |c   =\u003e\n        //\n        let mut b = Buffer::new();\n        b.insert(\"ab\\nc\");\n        b.set_cursor(Cursor::from_range(\u0026Range::new(0, 2, 1, 0)));\n        b.insert(\"X\");\n        assert_eq!(b.text(), \"abXc\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n    }\n\n    #[test]\n    fn move_to_beginning_of_line() {\n        // abc\n        // de\n        let mut b = Buffer::new();\n        b.insert(\"abc\\nde\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_beginning_of_line();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        b.set_cursor(Cursor::new(1, 1));\n        b.move_to_beginning_of_line();\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n    }\n\n    #[test]\n    fn move_to_end_of_line() {\n        // abc\n        // de\n        let mut b = Buffer::new();\n        b.insert(\"abc\\nde\");\n        b.set_cursor(Cursor::new(0, 1));\n        b.move_to_end_of_line();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n    }\n\n    #[test]\n    fn select_until_end_of_line() {\n        let mut b = Buffer::new();\n        b.insert(\"abc\");\n        b.set_cursor(Cursor::new(0, 1));\n        b.select_until_end_of_line();\n        assert_eq!(b.cursor(), \u0026Cursor::from_range(\u0026Range::new(0, 1, 0, 3)),);\n    }\n\n    #[test]\n    fn set_text() {\n        let mut b = Buffer::from_str(\"\");\n        b.set_text(\"abc\");\n        assert_eq!(b.text(), \"abc\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        let mut b = Buffer::from_str(\"123\\n456\");\n        b.set_text(\"x\");\n        assert_eq!(b.text(), \"x\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 1));\n    }\n\n    #[test]\n    fn truncate() {\n        // abc|XYZ  =\u003e  abc|\n        let mut b = Buffer::new();\n        b.insert(\"abcXYZ\");\n        b.set_cursor(Cursor::new(0, 3));\n        b.truncate();\n        assert_eq!(b.text(), \"abc\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n\n        // abc|      abc|xyz\n        // xyz  =\u003e\n        let mut b = Buffer::new();\n        b.insert(\"abc\\nxyz\");\n        b.set_cursor(Cursor::new(0, 3));\n        b.truncate();\n        assert_eq!(b.text(), \"abcxyz\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n    }\n\n    #[test]\n    fn truncate_reverse() {\n        // abc|XYZ  =\u003e  abc|\n        let mut b = Buffer::new();\n        b.insert(\"abcXYZ\");\n        b.set_cursor(Cursor::new(0, 3));\n        b.truncate_reverse();\n        assert_eq!(b.text(), \"XYZ\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        // abc       abc|xyz\n        // |xyz  =\u003e\n        let mut b = Buffer::new();\n        b.insert(\"abc\\nxyz\");\n        b.set_cursor(Cursor::new(1, 0));\n        b.truncate_reverse();\n        assert_eq!(b.text(), \"abcxyz\");\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n    }\n\n    #[test]\n    fn undo() {\n        let mut b = Buffer::new();\n        b.redo();\n        b.undo();\n        assert_eq!(b.text(), \"\");\n        b.insert(\"abc\");\n        b.mark_undo_point();\n        assert_eq!(b.text(), \"abc\");\n        b.redo(); // Do nothing.\n        assert_eq!(b.text(), \"abc\");\n        b.undo();\n        assert_eq!(b.text(), \"\");\n        b.redo();\n        assert_eq!(b.text(), \"abc\");\n        b.undo();\n        assert_eq!(b.text(), \"\");\n        b.undo();\n        assert_eq!(b.text(), \"\");\n        b.redo();\n        assert_eq!(b.text(), \"abc\");\n        b.redo();\n        assert_eq!(b.text(), \"abc\");\n\n        let mut b = Buffer::new();\n        b.insert(\"abc\");\n        b.mark_undo_point();\n        b.insert(\"123\");\n        b.mark_undo_point();\n        b.insert(\"xyz\");\n        b.mark_undo_point();\n        assert_eq!(b.text(), \"abc123xyz\");\n        b.undo();\n        assert_eq!(b.text(), \"abc123\");\n        b.undo();\n        assert_eq!(b.text(), \"abc\");\n        b.redo();\n        assert_eq!(b.text(), \"abc123\");\n        b.redo();\n        assert_eq!(b.text(), \"abc123xyz\");\n        b.undo();\n        assert_eq!(b.text(), \"abc123\");\n        b.undo();\n        assert_eq!(b.text(), \"abc\");\n        b.undo();\n        assert_eq!(b.text(), \"\");\n        b.undo();\n        assert_eq!(b.text(), \"\");\n    }\n\n    #[test]\n    fn current_word() {\n        // hello wor|ld from rust\n        let mut b = Buffer::from_str(\"hello world from rust\");\n        b.set_cursor(Cursor::new(0, 9));\n        assert_eq!(b.current_word(), Some(\"world\".to_owned()));\n        assert_eq!(b.current_word_range(), Some(Range::new(0, 6, 0, 11)));\n\n        // hello |world from rust\n        b.set_cursor(Cursor::new(0, 6));\n        assert_eq!(b.current_word(), Some(\"world\".to_owned()));\n        assert_eq!(b.current_word_range(), Some(Range::new(0, 6, 0, 11)));\n\n        // hello world| from rust\n        b.set_cursor(Cursor::new(0, 11));\n        assert_eq!(b.current_word(), Some(\"world\".to_owned()));\n        assert_eq!(b.current_word_range(), Some(Range::new(0, 6, 0, 11)));\n\n        // a b| c\n        let mut b = Buffer::from_str(\"a b c\");\n        b.set_cursor(Cursor::new(0, 3));\n        assert_eq!(b.current_word(), Some(\"b\".to_owned()));\n        assert_eq!(b.current_word_range(), Some(Range::new(0, 2, 0, 3)));\n\n        // |a b c\n        let mut b = Buffer::from_str(\"a b c\");\n        b.set_cursor(Cursor::new(0, 0));\n        assert_eq!(b.current_word(), Some(\"a\".to_owned()));\n        assert_eq!(b.current_word_range(), Some(Range::new(0, 0, 0, 1)));\n\n        // a | b\n        let mut b = Buffer::from_str(\"a  b\");\n        b.set_cursor(Cursor::new(0, 2));\n        assert_eq!(b.current_word(), None);\n        assert_eq!(b.current_word_range(), None);\n\n        // |\n        let mut b = Buffer::from_str(\"\");\n        b.set_cursor(Cursor::new(0, 0));\n        assert_eq!(b.current_word(), None);\n        assert_eq!(b.current_word_range(), None);\n    }\n\n    #[test]\n    fn move_to_prev_word() {\n        // abc 123|  =\u003e  abc |123\n        let mut b = Buffer::from_str(\"abc 123\");\n        b.set_cursor(Cursor::new(0, 7));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 4));\n\n        // abc |123  =\u003e  |abc 123\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        // abc 123  xy|z  =\u003e  abc 123  |xyz  =\u003e  abc |123  xyz  =\u003e |abc 123  xyz\n        let mut b = Buffer::from_str(\"abc 123  xyz\");\n        b.set_cursor(Cursor::new(0, 11));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 9));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 4));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        // a  =\u003e  a\n        // |b     |b\n        let mut b = Buffer::from_str(\"a\\nb\");\n        b.set_cursor(Cursor::new(1, 0));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(1, 0));\n\n        // (empty)\n        let mut b = Buffer::from_str(\"\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_prev_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n    }\n\n    #[test]\n    fn move_to_next_word() {\n        // |abc 123  =\u003e  abc| 123\n        let mut b = Buffer::from_str(\"abc 123\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n\n        // abc| 123  =\u003e  abc 123|\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 7));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 7));\n\n        // a|bc 123  xyz  =\u003e  abc| 123  xyz  =\u003e  abc 123|  xyz  =\u003e abc 123  xyz|\n        let mut b = Buffer::from_str(\"abc 123  xyz\");\n        b.set_cursor(Cursor::new(0, 1));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 3));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 7));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 12));\n\n        // |  =\u003e  |\n        //\n        let mut b = Buffer::from_str(\"\\n\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        // (empty)\n        let mut b = Buffer::from_str(\"\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 0));\n\n        // |a  =\u003e  a|\n        // b       b\n        let mut b = Buffer::from_str(\"a\\nb\");\n        b.set_cursor(Cursor::new(0, 0));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 1));\n        b.move_to_next_word();\n        assert_eq!(b.cursor(), \u0026Cursor::new(0, 1));\n    }\n\n    #[test]\n    fn prev_word_range() {\n        // abc|\n        let mut b = Buffer::from_str(\"abc\");\n        b.set_cursor(Cursor::new(0, 3));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 0, 0, 3)));\n\n        // abc xyz|\n        let mut b = Buffer::from_str(\"abc xyz\");\n        b.set_cursor(Cursor::new(0, 7));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 4, 0, 7)));\n\n        // abc|xyz\n        let mut b = Buffer::from_str(\"abcxyz\");\n        b.set_cursor(Cursor::new(0, 3));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 0, 0, 3)));\n\n        // abc xyz;|\n        let mut b = Buffer::from_str(\"abc xyz;\");\n        b.set_cursor(Cursor::new(0, 8));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 7, 0, 8)));\n\n        // abc !@#|\n        let mut b = Buffer::from_str(\"abc !@#\");\n        b.set_cursor(Cursor::new(0, 7));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 3, 0, 7)));\n\n        // ____abc\n        let mut b = Buffer::from_str(\"    abc\");\n        b.set_cursor(Cursor::new(0, 4));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 0, 0, 4)));\n\n        // (empty)\n        let mut b = Buffer::from_str(\"\");\n        b.set_cursor(Cursor::new(0, 0));\n        assert_eq!(b.prev_word_range(), None);\n\n        // abc\n        // |\n        let mut b = Buffer::from_str(\"abc\\n\");\n        b.set_cursor(Cursor::new(1, 0));\n        assert_eq!(b.prev_word_range(), Some(Range::new(0, 3, 1, 0)));\n    }\n\n    #[test]\n    fn find() {\n        // 012345678901234567890\n        // hello rust from rust\n        //       ^^^^      ^^^^\n        let mut b = Buffer::from_str(\"hello rust from rust\");\n        assert_eq!(\n            \u0026b.find(\"rust\"),\n            \u0026[Range::new(0, 6, 0, 10), Range::new(0, 16, 0, 20),]\n        );\n\n        let mut b = Buffer::from_str(\"hello rust from rust\");\n        assert_eq!(\u0026b.find(\"rrrrr\"), \u0026[]);\n\n        let mut b = Buffer::from_str(\"abXYZ\\nXYZab\");\n        assert_eq!(\n            \u0026b.find(\"XYZ\"),\n            \u0026[Range::new(0, 2, 0, 5), Range::new(1, 0, 1, 3),]\n        );\n\n        let mut b = Buffer::from_str(\"abXY\\nZab\");\n        assert_eq!(\u0026b.find(\"XY\\nZ\"), \u0026[Range::new(0,  enum NotificationLevel {\n    Info,\n    Error,\n}\n\npub struct Notification {\n    pub level: NotificationLevel,\n    pub message: String,\n    pub created_at: Instant,\n}\n\nenum EditorMode {\n    Normal,\n    Finder,\n}\n\npub enum ExitStatus {\n    Gracefully,\n    ForceExit { unsaved_files: Vec\u003cPathBuf\u003e },\n}\n\npub struct Editor {\n    exited: bool,\n    mode: EditorMode,\n    terminal: Terminal,\n    finder: Finder,\n    prompt_input: LineEdit,\n    event_queue: Receiver\u003cEvent\u003e,\n    buffers: HashMap\u003cPathBuf, Rc\u003cRefCell\u003cBuffer\u003e\u003e\u003e,\n    current_buffer: Rc\u003cRefCell\u003cBuffer\u003e\u003e,\n    notification: RefCell\u003cOption\u003cNotification\u003e\u003e,\n    backup_dir: PathBuf,\n}\n\nimpl Editor {\n    pub fn new() -\u003e Editor {\n        let (tx, rx) = channel();\n\n        // Prepare the noa directory.\n        let noa_dir = dirs::home_dir().unwrap().join(\".noa\");\n        std::fs::create_dir_all(\u0026noa_dir).expect(\"failed to create ~/.noa\");\n\n        // Open the scratch buffer.\n        let mut scratch_buffer = Buffer::new();\n        scratch_buffer.set_name(\"scratch\");\n\n        Editor {\n            exited: false,\n            mode: EditorMode::Normal,\n            terminal: Terminal::new(tx.clone()),\n            finder: Finder::new(tx),\n            prompt_input: LineEdit::new(),\n            event_queue: rx,\n            buffers: HashMap::new(),\n            current_buffer: Rc::new(RefCell::new(scratch_buffer)),\n            notification: RefCell::new(None),\n            backup_dir: noa_dir.join(\"backup\"),\n        }\n    }\n\n    pub fn open_file(\u0026mut self, path: \u0026Path) {\n        // Switch the buffer if the file is already opened.\n        let abs_path = match std::fs::canonicalize(path) {\n            Ok(abs_path) =\u003e {\n                if let Some(buffer) = self.buffers.get(\u0026abs_path) {\n                    self.current_buffer = buffer.clone();\n                    return;\n                } else {\n                    abs_path\n                }\n            }\n            Err(err) =\u003e {\n                self.error(format!(\"couldn't resolve the path: {:?}\", err));\n                return;\n            }\n        };\n\n        let writable = std::fs::OpenOptions::new()\n            .read(true)\n            .write(true)\n            .truncate(false)\n            .open(path)\n            .is_ok();\n        if !writable {\n            self.error(format!(\"not writable: {}\", path.display()));\n        }\n\n        match Buffer::open_file(path) {\n            Ok(mut buffer) =\u003e {\n                // Update the buffer name.\n                let current_dir = std::env::current_dir().unwrap();\n                let name = match abs_path.strip_prefix(\u0026current_dir) {\n                    Ok(stripped_path) =\u003e stripped_path.to_str().unwrap(),\n                    Err(_) =\u003e abs_path.to_str().unwrap(),\n                };\n                buffer.set_name(name);\n\n                let buffer_rc = Rc::new(RefCell::new(buffer));\n                self.buffers.insert(abs_path, buffer_rc.clone());\n                self.current_buffer = buffer_rc;\n            }\n            Err(err) =\u003e {\n                self.error(format!(\"couldn't open: {:?}\", err));\n            }\n        }\n    }\n\n    pub fn run(\u0026mut self) -\u003e ExitStatus {\n        loop {\n            if self.exited {\n                let unsaved_files: Vec\u003cPathBuf\u003e = self\n                    .buffers\n                    .values()\n                    .filter(|b| {\n                        let b = b.borrow();\n                        !b.is_virtual_file() \u0026\u0026 b.is_dirty()\n                    })\n                    .map(|b| b.borrow().path().unwrap().to_owned())\n                    .collect();\n\n                if unsaved_files.is_empty() {\n                    return ExitStatus::Gracefully;\n                } else {\n                    return ExitStatus::ForceExit { unsaved_files };\n                }\n            }\n\n            match self.mode {\n                EditorMode::Normal =\u003e {\n                    self.terminal.draw_buffer(\n                        \u0026mut *self.current_buffer.borrow_mut(),\n                        self.notification.borrow().as_ref(),\n                    );\n                }\n                EditorMode::Finder =\u003e {\n                    self.terminal.draw_finder(\u0026self.finder, \u0026self.prompt_input);\n                }\n            }\n\n            // Wait for the next event...\n            if let Ok(ev) = self.event_queue.recv() {\n                self.handle_event(ev);\n            }\n\n            // Receive other queued events.\n            while let Ok(ev) = self.event_queue.try_recv() {\n                self.handle_event(ev);\n            }\n\n            // Clear the notification.\n            if matches!(\u0026*self.notification.borrow(), Some(Notification { created_at, .. }) if created_at.elapsed().as_secs() \u003e 5)\n            {\n                *self.notification.borrow_mut() = None;\n            }\n\n            self.update_modes();\n        }\n    }\n\n    fn notify\u003cT: Into\u003cString\u003e\u003e(\u0026self, level: NotificationLevel, message: T) {\n        let message = message.into();\n        trace!(\"notify: {}\", message);\n        *self.notification.borrow_mut() = Some(Notification {\n            level,\n            created_at: Instant::now(),\n            message: message.replace(\"\\n\", \" \"),\n        });\n    }\n\n    fn info\u003cT: Into\u003cString\u003e\u003e(\u0026self, message: T) {\n        self.notify(NotificationLevel::Info, message);\n    }\n\n    fn error\u003cT: Into\u003cString\u003e\u003e(\u0026self, message: T) {\n        self.notify(NotificationLevel::Error, message);\n    }\n\n    fn enter_in_finder(\u0026mut self) {\n        if let Some(item) = self.finder.selected_item() {\n itorConfig {\n        EditorConfig {\n            indent_style: IndentStyle::Space,\n            indent_size: 4,\n            tab_width: 8,\n            end_of_line: EndOfLine::Lf,\n        }\n    }\n\n    pub fn resolve(source_file: \u0026Path) -\u003e EditorConfig {\n        resolve_config(\n            \u0026source_file\n                .canonicalize()\n                .unwrap_or_else(|_| PathBuf::from(\".\").canonicalize().unwrap()),\n        )\n    }\n}\n\n#[derive(Debug, PartialEq, Eq, Clone, Default)]\nstruct Rule {\n    pattern: String,\n    indent_style: Option\u003cIndentStyle\u003e,\n    indent_size: Option\u003cusize\u003e,\n    tab_width: Option\u003cusize\u003e,\n    end_of_line: Option\u003cEndOfLine\u003e,\n    // TODO: Support end_of_line and insert_final_newline\n}\n\n#[derive(Debug, PartialEq, Eq)]\nstruct ConfigFile {\n    root: bool,\n    rules: Vec\u003cRule\u003e,\n}\n\nfn parse_config(body: \u0026str) -\u003e ConfigFile {\n    let mut in_global = true;\n    let mut root = false;\n    let mut rules = Vec::new();\n    let mut rule: Rule = Default::default();\n    let mut pattern = None;\n\n    for mut line in body.split('\\n') {\n        line = line.trim_start();\n        if line.starts_with('[') {\n            // [pattern]\n            if let Some(index) = line.find(']') {\n                in_global = false;\n                if let Some(pattern) = pattern {\n                    rule.pattern = pattern;\n                    rules.push(rule);\n                }\n                pattern = Some((\u0026line[1..index]).to_string());\n                rule = Default::default();\n            }\n        } else if line.starts_with('#') {\n            // A comment line. Just ignore it.\n        } else if let Some(index) = line.find('=') {\n            // key = value\n            if index \u003c line.len() {\n                let key = (\u0026line[..index]).trim();\n                let mut value = (\u0026line[(index + 1)..]).trim();\n\n                // Remove a comment.\n                if let Some(index) = value.find('#') {\n                    value = \u0026value[..index - 1];\n                }\n\n                if in_global {\n                    if key == \"root\" {\n                        root = value == \"true\";\n                    }\n                } else {\n                    match key {\n                        \"indent_style\" =\u003e match value {\n                            \"space\" =\u003e {\n                                rule.indent_style = Some(IndentStyle::Space);\n                            }\n                            \"tab\" =\u003e {\n                                rule.indent_style = Some(IndentStyle::Tab);\n                            }\n                            _ =\u003e {}\n                        },\n                        \"end_of_line\" =\u003e match value {\n                            \"cr\" =\u003e {\n                                rule.end_of_line = Some(EndOfLine::Cr);\n                            }\n                            \"lf\" =\u003e {\n                                rule.end_of_line = Some(EndOfLine::Lf);\n                            }\n                            \"crlf\" =\u003e {\n                                rule.end_of_line = Some(EndOfLine::CrLf);\n                            }\n                            _ =\u003e {}\n                        },\n                        \"indent_size\" =\u003e {\n                            if let Ok(value) = value.parse::\u003cusize\u003e() {\n                                rule.indent_size = Some(value);\n                            }\n                        }\n                        \"tab_width\" =\u003e {\n                            if let Ok(value) = value.parse::\u003cusize\u003e() {\n                                rule.tab_width = Some(value);\n                            }\n                        }\n                        _ =\u003e {}\n                    }\n                }\n            }\n        }\n    }\n\n    if let Some(pattern) = pattern {\n        rule.pattern = pattern;\n        rules.push(rule);\n    }\n\n    ConfigFile { root, rules }\n}\n\nfn skip(s: \u0026str, n: usize) -\u003e \u0026str {\n    if s.len() \u003c= n {\n        \"\"\n    } else {\n        \u0026s[n..]\n    }\n}\n\nfn matches_pattern(pattern: \u0026str, path: \u0026str) -\u003e bool {\n    if pattern.is_empty() \u0026\u0026 path.is_empty() {\n        return true;\n    }\n\n    if pattern.is_empty() || path.is_empty() {\n        return false;\n    }\n\n    if pattern.starts_with(\"**\") {\n        return matches_pattern(\u0026pattern, skip(path, 1))\n            || matches_pattern(skip(pattern, 2), skip(path, 1))\n            || matches_pattern(skip(pattern, 2), path);\n    } else if pattern.starts_with('*') {\n        if path.starts_with('/') {\n            return matches_pattern(skip(pattern, 1), path);\n        } else {\n            return matches_pattern(\u0026pattern, skip(path, 1))\n                || matches_pattern(skip(pattern, 1), skip(path, 1))\n                || matches_pattern(skip(pattern, 1), path);\n        }\n    } else if pattern.starts_with('{') \u0026\u0026 pattern.contains('}') {\n        let mut prev_comma = 0;\n        let remaining = skip(pattern, pattern.find('}').unwrap() + 1);\n        while let Some(mut comma) = skip(pattern, prev_comma + 1).find(|c| c == ',' || c == '}') {\n            comma += prev_comma + 1;\n            let inner_pattern = \u0026pattern[(prev_comma + 1)..comma];\n            let pat = format!(\"{}{}\", inner_pattern, remaining);\n            if matches_pattern(\u0026pat, path) {\n                return true;\n            }\n\n            if (\u0026pattern[comma..]).starts_with('}') {\n                break;\n            }\n\n            prev_comma = comma;\n        }\n        false\n    } else {\n        // Skip until a special character.\n        let mut i = 0;\n        for ch in pattern.chars() {\n            if ch == '{' || ch == '*' || ch == ']' {\n                break;\n            }\n            i += 1;\n        }\n\n        let span = \u0026pattern[0..i];\n        if i \u003e 0 \u0026\u0026 path.starts_with(span) {\n            return matches_pattern(skip(pattern, i), skip(path, i));\n        } else {\n            false\n        }\n    }\n}\n\nfn resolve_config(source_file: \u0026Path) -\u003e EditorConfig {\n    assert!(source_file.is_absolute());\n\n    // Read and parse all .editconfig files...\n    let mut configs = Vec::new();\n    for dir in source_file.parent().unwrap().ancestors() {\n        let mut path = PathBuf::from(dir);\n        path.push(\".editorconfig\");\n        if let Ok(mut file) = std::fs::File::open(\u0026path) {\n            use std::io::Read;\n            let mut body = String::with_capacity(512);\n            file.read_to_string(\u0026mut body).ok();\n\n            let config = parse_config(\u0026body);\n            let is_root = config.root;\n            configs.push((dir.to_path_buf(), config));\n\n            if is_root {\n                break;\n            }\n        }\n    }\n\n    // Visit from the root and determine the config for the source file.\n    let mut ret = EditorConfig::default();\n    for (dir, config) in configs.iter().rev() {\n        for rule in \u0026config.rules {\n            let relative_path = if rule.pattern.starts_with('*') {\n                // Handle [*.foo] patterns (i.e. matching all files in all dirs)\n                source_file.file_name().unwrap().to_str().unwrap()\n            } else {\n                source_file.strip_prefix(dir).unwrap().to_str().unwrap()\n            };\n\n            if matches_pattern(\u0026rule.pattern, relative_path) {\n                trace!(\"applying {}/.editorconfig\", dir.as_path().display());\n                ret.indent_style = rule.indent_style.unwrap_or(ret.indent_style);\n                ret.indent_size = rule.indent_size.unwrap_or(ret.indent_size);\n                ret.tab_width = rule.tab_width.unwrap_or(ret.tab_width);\n            }\n        }\n    }\n\n    ret\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_config() {\n        assert_eq!(\n            parse_config(\n                r#\"\n                # this is a comment\n                root = true\n\n                [*.rs] # comment\n                indent_style = space # comment\n                indent_size = 4 # comment\n\n                [*.md]\n                indent_style = tab\n                tab_width = 8\n                end_of_line = crlf\n\n                [broken]\n                foo =\n                bar\n            \"#\n            ),\n            ConfigFile {\n                root: true,\n                rules: vec![\n                    Rule {\n                        pattern: \"*.rs\".to_owned(),\n                        indent_style: Some(IndentStyle::Space),\n                        indent_size: Some(4),\n                        tab_width: None,\n                        end_of_line: None,\n                    },\n                    Rule {\n                        pattern: \"*.md\".to_owned(),\n                        indent_style: Some(IndentStyle::Tab),\n                        indent_size: None,\n                        tab_width: Some(8),\n                        end_of_line: Some(EndOfLine::CrLf),\n                    },\n                    Rule {\n                        pattern: \"broken\".to_owned(),\n                        indent_style: None,\n                        indent_size: None,\n                        tab_width: None,\n                        end_of_line: None,\n                    }\n                ]\n            }\n        );\n    }\n\n    #[test]\n    fn test_matches_pattern() {\n        assert!(matches_pattern(\"lib/bar/baz.js\", \"lib/bar/baz.js\"));\n        assert!(matches_pattern(\"*\", \"foo.js\"));\n        assert!(!matches_pattern(\"*.js\", \"lib/foo.js\"));\n        assert!(matches_pattern(\"**\", \"lib/foo.js\"));\n        assert!(matches_pattern(\"lib/**\", \"lib/foo.js\"));\n        assert!(matches_pattern(\"lib/**.js\", \"lib/foo/bar.js\"));\n        assert!(!matches_pattern(\"lib/**.js\", \"lib/foo.rb\"));\n        assert!(matches_pattern(\"lib/*.js\", \"lib/foo.js\"));\n        assert!(!matches_pattern(\"lib/*.js\", \"lib/foo/bar.js\"));\n        assert!(matches_pattern(\"lib/**.{js,rb}\", \"lib/foo.rb\"));\n        assert!(!matches_pattern(\"lib/**.{js,rb}\", \"lib/foo.r\"));\n        assert!(!matches_pattern(\"lib/**.{js,rb}{a,b}\", \"lib/foo.rb\"));\n        assert!(matches_pattern(\"lib/**.{js,rb}{a,b}\", \"lib/foo.rba\"));\n        assert!(matches_pattern(\"{Makefile,.lldbrc,README.md}\", \"Makefile\"));\n        assert!(matches_pattern(\"{Makefile,.lldbrc,README.md}\", \".lldbrc\"));\n        assert!(matches_pattern(\"{Makefile,.lldbrc,README.md}\", \"README.md\"));\n\n        assert!(!matches_pattern(\"\", \"foo.js\"));\n        assert!(!matches_pattern(\"{}\", \"foo.js\"));\n        assert!(!matches_pattern(\"{,,,}\", \"foo.js\"));\n        assert!(!matches_pattern(\"{,,,\", \"foo.js\"));\n        assert!(!matches_pattern(\"{\", \"foo.js\"));\n        assert!(!matches_pattern(\"}\", \"foo.js\"));\n    }\n}\n","traces":[{"line":25,"address":[4228432],"length":1,"stats":{"Line":24},"fn_name":"default"},{"line":34,"address":[4228464,4228602],"length":1,"stats":{"Line":0},"fn_name":"resolve"},{"line":36,"address":[4228484],"length":1,"stats":{"Line":0},"fn_name":null},{"line":37,"address":[],"length":0,"stats":{"Line":0},"fn_name":null},{"line":38,"address":[4741968,4741998],"length":1,"stats":{"Line":0},"fn_name":"{{closure}}"},{"line":59,"address":[4228640,4231901],"length":1,"stats":{"Line":1},"fn_name":"parse_config"},{"line":60,"address":[4228666],"length":1,"stats":{"Line":1},"fn_name":null},{"line":61,"address":[4228690],"length":1,"stats":{"Line":1},"fn_name":null},{"line":62,"address":[4228698],"length":1,"stats":{"Line":1},"fn_name":null},{"l         self.x -= l;\n                break;\n            } else if self.y == 0 {\n                break;\n            } else {\n                l -= self.x;\n                if l \u003e 0 {\n                    l -= 1;\n                    self.y -= 1;\n                    self.x = rope.line_len(self.y);\n                }\n            }\n        }\n\n        self.y = self.y.saturating_add(down);\n        self.y = self.y.saturating_sub(up);\n\n        self.y = min(self.y, num_lines);\n        self.x = min(self.x, rope.line_len(self.y));\n    }\n}\n\nimpl fmt::Display for Point {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"({}, {})\", self.y, self.x)\n    }\n}\n\nimpl Ord for Point {\n    fn cmp(\u0026self, other: \u0026Point) -\u003e Ordering {\n        let a = self;\n        let b = other;\n        if a == b {\n            Ordering::Equal\n        } else {\n            match a.y.cmp(\u0026b.y) {\n                Ordering::Less =\u003e Ordering::Less,\n                Ordering::Greater =\u003e Ordering::Greater,\n                Ordering::Equal =\u003e {\n                    if a.x \u003c b.x {\n                        Ordering::Less\n                    } else {\n                        Ordering::Greater\n                    }\n                }\n            }\n        }\n    }\n}\n\nimpl PartialOrd for Point {\n    fn partial_cmp(\u0026self, other: \u0026Point) -\u003e Option\u003cOrdering\u003e {\n        Some(self.cmp(other))\n    }\n}\n\n#[derive(Debug, PartialEq, Eq, Clone)]\npub struct Range {\n    pub start: Point,\n    pub end: Point,\n}\n\nimpl Range {\n    pub fn new(start_y: usize, start_x: usize, end_y: usize, end_x: usize) -\u003e Range {\n        Range::from_points(Point::new(start_y, start_x), Point::new(end_y, end_x))\n    }\n\n    pub fn from_points(start: Point, end: Point) -\u003e Range {\n        Range { start, end }\n    }\n\n    pub fn front(\u0026self) -\u003e \u0026Point {\n        min(\u0026self.start, \u0026self.end)\n    }\n\n    pub fn back(\u0026self) -\u003e \u0026Point {\n        max(\u0026self.start, \u0026self.end)\n    }\n}\n\nimpl fmt::Display for Range {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"[{}, {}]\", self.start, self.end)\n    }\n}\n\n#[derive(Debug, Eq, Clone)]\npub enum Cursor {\n    Normal { pos: Point, logical_x: usize },\n    Selection { range: Range, logical_x: usize },\n}\n\nimpl Cursor {\n    pub fn new(y: usize, x: usize) -\u003e Cursor {\n        Cursor::Normal {\n            pos: Point::new(y, x),\n            logical_x: x,\n        }\n    }\n\n    pub fn from_point(pos: \u0026Point) -\u003e Cursor {\n        Cursor::new(pos.y, pos.x)\n    }\n\n    pub fn from_range(range: \u0026Range) -\u003e Cursor {\n        Cursor::Selection {\n            range: range.clone(),\n            logical_x: range.end.x,\n        }\n    }\n}\n\nimpl PartialEq for Cursor {\n    fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Cursor::Normal { pos: a, .. }, Cursor::Normal { pos: b, .. }) =\u003e a == b,\n            (Cursor::Selection { range: a, .. }, Cursor::Selection { range: b, .. }) =\u003e a == b,\n            _ =\u003e false,\n        }\n    }\n}\n\nimpl Ord for Cursor {\n    fn cmp(\u0026self, other: \u0026Cursor) -\u003e Ordering {\n        let a = match self {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        let b = match other {\n            Cursor::Normal { pos, .. } =\u003e pos,\n            Cursor::Selection {\n                range: Range { start, .. },\n                ..\n            } =\u003e start,\n        };\n\n        a.cmp(b)\n    }\n}\n\nimpl PartialOrd for Cursor {\n    fn partial_cmp(\u0026self, other: \u0026Cursor) -\u003e Option\u003cOrdering\u003e {\n        Some(self.cmp(other))\n    }\n}\n\n#[derive(Clone, Debug, PartialEq)]\npub struct Rope {\n    inner: ropey::Rope,\n    cached_num_lines: usize,\n}\n\nimpl Rope {\n    pub fn new() -\u003e Rope {\n        Rope {\n            inner: ropey::Rope::new(),\n            cached_num_lines: 1,\n        }\n    }\n\n    pub fn from_reader\u003cT: std::io::Read\u003e(reader: T) -\u003e std::io::Result\u003cRope\u003e {\n        let inner = ropey::Rope::from_reader(reader)?;\n        let cached_num_lines = inner.len_lines();\n        Ok(Rope {\n            inner,\n            cached_num_lines,\n        })\n    }\n\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.inner.len_chars() == 0\n    }\n\n    /// Returns the number of characters in the buffer.\n    #[cfg(test)]\n    pub fn len(\u0026self) -\u003e usize {\n        self.inner.len_chars()\n    }\n\n    /// Returns the number of characters in the buffer.\n    pub fn num_lines(\u0026self) -\u003e usize {\n        self.cached_num_lines\n    }\n\n    /// Returns the number of characters in a line except new line characters.\n    pub fn line_len(\u0026self, line: usize) -\u003e usize {\n        if line == self.num_lines() {\n            0\n        } else {\n            self.line(line).len_chars()\n        }\n    }\n\n    pub fn text(\u0026self) -\u003e String {\n        self.inner.to_string()\n    }\n\n    pub fn save_into_file(\u0026self, path: \u0026Path) -\u003e std::io::Result\u003c()\u003e {\n        let f = OpenOptions::new().write(true).truncate(true).open(path)?;\n        self.inner.write_to(f)\n    }\n\n    pub fn insert(\u0026mut self, pos: \u0026Point, string: \u0026str) {\n        self.inner.insert(self.index_in_rope(pos), string);\n        self.on_modified(pos.y);\n    }\n\n    pub fn insert_char(\u0026mut self, pos: \u0026Point, ch: char) {\n        self.inner.insert_char(self.index_in_rope(pos), ch);\n        self.on_modified(pos.y);\n    }\n\n    pub fn clear(\u0026mut self) {\n        self.inner.remove(0..self.inner.len_chars());\n    }\n\n    pub fn remove(\u0026mut self, range: \u0026Range) {\n        let start = self.index_in_rope(range.front());\n        let end = self.index_in_rope(range.back());\n        self.inner.remove(start..end);\n        self.on_modified(range.front().y);\n    }\n\n    fn on_modified(\u0026mut self, _start_y: usize) {\n        self.cached_num_lines = self.inner.len_lines();\n    }\n\n    /// Returns a line except new line characters.\n    pub fn line(\u0026self, line: usize) -\u003e ropey::RopeSlice {\n        let slice = self.inner.line(line);\n\n        // The slice contains newline characters. Trim them.\n        let mut len = slice.len_chars();\n        while len \u003e 0 {\n            if slice.char(len - 1) != '\\n' {\n                break;\n            }\n\n            len -= 1;\n        }\n\n        slice.slice(..len)\n    }\n\n    pub fn chars(\u0026self) -\u003e ropey::iter::Chars\u003c'_\u003e {\n        self.inner.chars()\n    }\n\n    pub fn sub_str(\u0026self, range: \u0026Range) -\u003e ropey::RopeSlice {\n        let start = self.index_in_rope(range.front());\n        let end = self.index_in_rope(range.back());\n        self.inner.slice(start..end)\n    }\n\n    pub fn word_at(\u0026self, pos: \u0026Point) -\u003e Option\u003c(Range, String)\u003e {\n        if pos.y \u003e= self.num_lines() {\n            return None;\n        }\n\n        let mut word = String::new();\n        let mut start = 0;\n        let mut end = 0;\n        for (i, ch) in self.line(pos.y).chars().enumerate() {\n            if is_word_char(ch) {\n                word.push(ch);\n                end = i + 1;\n            } else if i \u003e= pos.x {\n                break;\n            } else {\n                word.clear();\n                start = i + 1;\n            }\n        }\n\n        if word.is_empty() {\n            None\n        } else {\n            Some((Range::new(pos.y, start, pos.y, end), word))\n        }\n    }\n\n    pub fn prev_word_at(\u0026self, pos: \u0026Point) -\u003e Option\u003cRange\u003e {\n        if pos.x == 0 {\n            if pos.y \u003e 0 {\n                return Some(Range::new(pos.y - 1, self.line_len(pos.y - 1), pos.y, 0));\n            } else {\n                return None;\n            }\n        }\n\n        let mut state = None;\n        let mut start = 0;\n        for (i, ch) in self.line(pos.y).chars().take(pos.x).enumerate() {\n            let current_state = is_word_char(ch);\n            match state {\n                Some(prev_state) if prev_state == current_state =\u003e {}\n                _ =\u003e {\n                    start = i;\n                }\n            }\n\n            state = Some(current_state);\n        }\n\n        Some(Range::new(pos.y, start, pos.y, pos.x))\n    }\n\n    pub fn prev_word_end(\u0026self, pos: \u0026Point) -\u003e Point {\n        assert!(pos.y \u003c self.num_lines());\n\n        let line = self.line(pos.y).to_string();\n        let line_len = line.chars().count();\n        let end = line\n            .chars()\n            .rev()\n            .skip(line_len - pos.x)\n            .enumerate()\n            .skip_while(|(_, ch)| !is_word_char(*ch))\n            .find(|(_, ch)| !is_word_char(*ch))\n            .map(|(i, _)| pos.x - i)\n            .unwrap_or(0);\n\n        Point::new(pos.y, end)\n    }\n\n    pub fn next_word_end(\u0026self, pos: \u0026Point) -\u003e Point {\n        assert!(pos.y \u003c self.num_lines());\n\n        let line = self.line(pos.y);\n        let end = line\n            .chars()\n            .skip(pos.x)\n            .enumerate()\n            .skip_while(|(_, ch)| !is_word_char(*ch))\n            .find(|(_, ch)| !is_word_char(*ch))\n            .map(|(i, _)| pos.x + i)\n            .unwrap_or_else(|| line.len_chars());\n\n        Point::new(pos.y, end)\n    }\n\n    fn index_in_rope(\u0026self, pos: \u0026Point) -\u003e usize {\n        self.inner.line_to_char(pos.y) + pos.x\n    }\n}\n\nfn is_word_char(ch: char) -\u003e bool {\n    char::is_ascii_alphanumeric(\u0026ch) || ch == '_'\n}\n\n#[cfg(test)]\nmod test {\n    use super::*;\n\n    #[test]\n    fn sorting_cursors() {\n        // a|bc|\n        // de|f\n        // x|yz\n\n        // Make sure cursors gets sorted.\n        let mut cursors = vec![\n            Cursor::new(1, 2),\n            Cursor::new(0, 3),\n            Cursor::new(2, 1),\n            Cursor::new(0, 1),\n        ];\n\n        cursors.sort();\n        assert_eq!(\n            cursors,\n            \u0026[\n                Cursor::new(0, 1),\n                Cursor::new(0, 3),\n                Cursor::new(1, 2),\n                Cursor::new(2, 1),\n            ]\n        );\n    }\n}\n","traces":[{"line":14,"address":[4344080],"length":1,"stats":{"Line":22},"fn_name":"new"},{"line":18,"address":[4344128],"length":1,"stats":{"Line":1},"fn_name":"move_by"},{"line":19,"address":[4344191],"length":1,"stats":{"Line":1},"fn_name":null},{"line":20,"address":[4344263],"length":1,"stats":{"Line":1},"fn_name":null},{"line":21,"address":[4344633],"length":1,"stats":{"Line":1},"fn_name":null},{"line":22,"address":[4344279],"length":1,"stats":{"Line":1},"fn_name":null},{"line":23,"address":[4344319,4345171],"length":1,"stats":{"Line":1},"fn_name":null},{"line":24,"address":[4344395,4345201],"length":1,"stats":{"Line":1},"fn_name":null},{"line":25,"address":[4344449],"length":1,"stats":{"Line":1},"fn_name":null},{"line":26,"address":[4344388],"length":1,"stats":{"Line":1},"fn_name":null},{"line":27,"address":[],"length":0,"stats":{"Line":0},"fn_name":null},{"line":29,"address":[4344470,4345351,4344503],"length":1,"stats":{"Line":2},"fn_name":null},{"line":30,"address":[4344580],"length":1,"stats":{"Line":1},"fn_name":null},{"line":31,"address":[4345471,4345441,4344588],"length":1,"stats":{"Line":1},"fn_name":null},{"line":35,"address":[4344646],"length":1,"stats":{"Line":1},"fn_name":null},{"line":36,"address":[4344969],"length"
