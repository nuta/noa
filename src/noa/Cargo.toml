[package]
name = "noa"
version = "0.0.0"
authors = ["Seiya Nuta <nuta@seiya.me>"]
edition = "2018"

[[bin]]
name = "noa"
path = "main.rs"

[dev-dependencies]
pretty_assertions = "0"

[dependencies]
log = "0"
anyhow = "1"
simplelog = "0"
backtrace = "0"
structopt = "0"
tokio = { version = "1", features = ["full"] }
futures = "0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0"
ropey = "1"
crossterm = { version = "0", features = ["event-stream"] }
unicode-width = "0"
arrayvec = "0"
ignore = "0"
sublime_fuzzy = "0"

noa_common = { path = "../common" }
noa_buffer = { path = "../buffer" }
noa_editorconfig = { path = "../editorconfig" }
