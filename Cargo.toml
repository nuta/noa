[package]
name = "noa"
version = "0.0.0"
authors = ["Seiya Nuta <nuta@seiya.me>"]
edition = "2018"

[dependencies]
log = { version = "0", features = ["max_level_trace", "release_max_level_info"] }
fern = { version = "0", features = ["colored"] }
lazy_static = "1"
backtrace = "0"
structopt = "0"
crossterm = "0"
unicode-width = "0"
ropey = "1"
dirs = "3"
regex = "1"
maplit = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
grep = "0"
ignore = "0"
notify = "4"
git2 = "0"
fxhash = "0"
jsonrpc-core = "15"
lsp-types = "0"
clipboard = "0"

[dev-dependencies]
pretty_assertions = "0"

[profile.release]
opt-level = 3
debug = true
rpath = false
lto = true
debug-assertions = false
codegen-units = 1
panic = 'unwind'
incremental = false
overflow-checks = false
