[package]
name = "noa"
version = "0.0.2"
authors = ["Seiya Nuta <nuta@seiya.me>"]
edition = "2018"
description = "A batteries-included terminal-based text editor."
keywords = []
categories = ["text-editors"]
readme = "README.md"
license = "CC0-1.0 OR MIT"
repository = "https://github.com/nuta/noa"

[dependencies]
lazy_static = "1"
log = { version = "^0.4.6", features = ["max_level_trace", "release_max_level_warn"] }
termion = "^1.5.1"
unicode-width = "0"
signal-hook = "0"
dirs = "2"
backtrace = "0"
structopt = "0"
ignore = "0"
fxhash = "0"
lsp-types = "0"
serde = "1"
serde_json = "1"
jsonrpc-core = "14"
phf = { version = "0.8", features = ["macros"] }

[dev-dependencies]
pretty_assertions = "0"

[profile.release]
opt-level = 3
debug = true
rpath = false
lto = true
debug-assertions = false
codegen-units = 1
panic = 'unwind'
incremental = false
overflow-checks = false
